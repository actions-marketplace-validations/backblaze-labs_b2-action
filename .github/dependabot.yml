version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    groups:
      types:
        patterns: ['@types/*']
      lint-and-format:
        patterns:
          - '@biomejs/*'
          - 'eslint*'
      test-runner:
        patterns:
          - 'vitest'
          - '@vitest/*'
    labels:
      - 'deps'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    labels:
      - 'deps'
      - 'github-actions'
