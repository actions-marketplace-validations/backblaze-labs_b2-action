name: 'Example — scheduled backup (cron + SSE-B2 + retention)'

# Daily cron that captures a small payload, uploads with SSE-B2, and applies a
# 7-day governance retention. The bucket must have Object Lock enabled
# (`B2_TEST_BUCKET_LOCKED`).

on:
  workflow_dispatch:
  # Daily 03:17 UTC. Tweak as needed.
  schedule:
    - cron: '17 3 * * *'
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backup:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'push' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    env:
      BACKUP_KEY: backups/${{ github.run_id }}/snapshot-$(date -u +%Y%m%d).tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Build snapshot payload
        id: payload
        run: |
          mkdir -p _snapshot
          date -u > _snapshot/timestamp.txt
          uname -a > _snapshot/host.txt
          tar -czf snapshot.tar.gz _snapshot
          key="backups/${{ github.run_id }}/snapshot-$(date -u +%Y%m%d).tar.gz"
          echo "key=$key" >> "$GITHUB_OUTPUT"

      - name: Upload (SSE-B2)
        uses: ./
        with:
          action: upload
          application-key-id: ${{ secrets.B2_APPLICATION_KEY_ID }}
          application-key: ${{ secrets.B2_APPLICATION_KEY }}
          bucket: ${{ secrets.B2_TEST_BUCKET_LOCKED }}
          source: snapshot.tar.gz
          destination: ${{ steps.payload.outputs.key }}
          sse: B2

      - name: Apply 7-day governance retention
        uses: ./
        with:
          action: retention
          application-key-id: ${{ secrets.B2_APPLICATION_KEY_ID }}
          application-key: ${{ secrets.B2_APPLICATION_KEY }}
          bucket: ${{ secrets.B2_TEST_BUCKET_LOCKED }}
          source: ${{ steps.payload.outputs.key }}
          retention-mode: governance
          retention-until: ${{ format('{0}', github.event.repository.pushed_at) }}
        # In practice, compute a future ISO timestamp:
        # retention-until: $(date -u -d '+7 days' +%Y-%m-%dT%H:%M:%SZ)
        continue-on-error: true   # PR runs without a locked bucket simply skip
