name: CodeQL

# Static analysis (SAST) over the TypeScript source with GitHub CodeQL.
# Runs on PRs to main, on push to main, and weekly so newly-added queries catch
# issues in code that hasn't changed. Findings surface in the repo Security tab.
#
# `build-mode: none`: JavaScript/TypeScript is analyzed straight from source, so
# no compile or dependency install is needed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Monday 04:23 UTC (off-the-hour to avoid the cron stampede).
    - cron: '23 4 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload results to the Security tab
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3.36.0
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@03e4368ac7daa2bd82b3e85262f3bf87ee112f57 # v3.36.0
        with:
          category: '/language:javascript-typescript'
