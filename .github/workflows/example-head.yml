name: 'Example: head (metadata probe without body transfer)'

# HEAD a B2 object to read its metadata (size, SHA-1, content-type,
# fileInfo, upload timestamp) without transferring the body. Useful for
# cheap pre-checks before a download, or for asserting that an upload
# from an earlier step actually landed with the SHA-1 you expected.

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  head:
    name: head
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    env:
      KEY: examples/head/${{ github.run_id }}/probe.bin
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Create asset
        run: dd if=/dev/urandom of=probe.bin bs=1024 count=8

      - name: Upload
        id: up
        uses: ./
        with:
          action: upload
          application-key-id: ${{ secrets.B2_APPLICATION_KEY_ID }}
          application-key: ${{ secrets.B2_APPLICATION_KEY }}
          bucket: ${{ secrets.B2_TEST_BUCKET }}
          source: probe.bin
          destination: ${{ env.KEY }}
          content-type: 'application/octet-stream'

      - name: HEAD the object
        id: probe
        uses: ./
        with:
          action: head
          application-key-id: ${{ secrets.B2_APPLICATION_KEY_ID }}
          application-key: ${{ secrets.B2_APPLICATION_KEY }}
          bucket: ${{ secrets.B2_TEST_BUCKET }}
          source: ${{ env.KEY }}

      - name: Assert HEAD outputs match upload
        env:
          PROBE_FILE_ID: ${{ steps.probe.outputs.file-id }}
          UPLOAD_FILE_ID: ${{ steps.up.outputs.file-id }}
          PROBE_SHA1: ${{ steps.probe.outputs.content-sha1 }}
          UPLOAD_SHA1: ${{ steps.up.outputs.content-sha1 }}
          BYTES_TRANSFERRED: ${{ steps.probe.outputs.bytes-transferred }}
          SUMMARY_JSON: ${{ steps.probe.outputs.summary-json }}
        run: |
          set -euo pipefail
          test "$PROBE_FILE_ID" = "$UPLOAD_FILE_ID"
          test "$PROBE_SHA1" = "$UPLOAD_SHA1"
          # HEAD transfers no bytes:
          test "$BYTES_TRANSFERRED" = "0"
          # summary-json is an array of HeadResults (one entry); spot-check shape:
          echo "$SUMMARY_JSON" | jq -e '.[0].contentType, .[0].uploadTimestamp, .[0].size'

      - name: Cleanup
        if: always()
        uses: ./
        with:
          action: delete
          application-key-id: ${{ secrets.B2_APPLICATION_KEY_ID }}
          application-key: ${{ secrets.B2_APPLICATION_KEY }}
          bucket: ${{ secrets.B2_TEST_BUCKET }}
          source: ${{ env.KEY }}
