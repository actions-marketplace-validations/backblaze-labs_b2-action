name: Docs lint

# Four integrity checks for the documentation + prose surface:
#   1. `action.yml` <> README.md sync (every input/output appears in both).
#   2. markdownlint-cli2 for prose style consistency.
#   3. lychee for broken markdown links (offline + fragment-aware).
#   4. cspell for spelling across source, markdown, and workflow YAML.
#
# Cheap and fast. Runs on every PR + every push to main.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.ts'
      - '**/*.yml'
      - '**/*.yaml'
      - 'action.yml'
      - 'cspell.json'
      - '.cspell/**'
      - 'scripts/check-action-yml-vs-readme.mjs'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/docs-lint.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-check:
    name: action.yml <> README
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - run: node scripts/check-action-yml-vs-readme.mjs

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      # We only need markdownlint-cli2 here, not the full dep tree. Install
      # it directly to keep the job fast.
      - run: pnpm dlx markdownlint-cli2

  link-check:
    name: Markdown link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # Offline mode: only check relative paths and fragments. External
          # URLs go un-pinged to keep this job fast and stable. The repo's
          # CI is not the right place to discover that a Backblaze docs
          # page got reorganized.
          args: --offline --include-fragments --no-progress --verbose '**/*.md'
          fail: true

  spellcheck:
    name: cspell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      # cspell is self-contained: it does not need our runtime deps. Install
      # only what's required to keep the job fast.
      - run: pnpm dlx cspell@9 --no-progress --no-must-find-files
