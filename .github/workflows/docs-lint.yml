name: Docs lint

# Four integrity checks for the documentation + prose surface:
#   1. `action.yml` <> README.md sync (every input/output appears in both).
#   2. markdownlint-cli2 for prose style consistency.
#   3. lychee for broken markdown links (offline + fragment-aware).
#   4. cspell for spelling across source, markdown, and workflow YAML.
#
# Cheap and fast. Runs on every PR + every push to main.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.ts'
      - '**/*.yml'
      - '**/*.yaml'
      - 'action.yml'
      - 'package.json'
      - 'cspell.json'
      - '.cspell/**'
      - 'scripts/check-action-yml-vs-readme.mjs'
      - 'scripts/run-lychee-lib.mjs'
      - 'scripts/run-lychee.mjs'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/docs-lint.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-check:
    name: action.yml <> README
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - run: node scripts/check-action-yml-vs-readme.mjs

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      # We only need markdownlint-cli2 here, not the full dep tree. Install
      # it directly to keep the job fast.
      - run: pnpm dlx markdownlint-cli2

  link-check:
    name: Markdown link check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: lychee-cache
        with:
          path: ${{ runner.temp }}/lychee-cache
          key: ${{ runner.os }}-${{ runner.arch }}-lychee-0.23.0
      # Same dependency-free pinned-lychee command contributors run locally.
      # The offline, fragment-aware, node_modules-excluding flags live in the
      # lychee runner.
      - run: pnpm docs:links
        env:
          LYCHEE_CACHE_DIR: ${{ runner.temp }}/lychee-cache
      - uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        if: always() && steps.lychee-cache.outputs.cache-hit != 'true'
        with:
          path: ${{ runner.temp }}/lychee-cache
          key: ${{ steps.lychee-cache.outputs.cache-primary-key }}

  spellcheck:
    name: cspell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      # cspell is self-contained: it does not need our runtime deps. Install
      # only what's required to keep the job fast.
      - run: pnpm dlx cspell@9 --no-progress --no-must-find-files
