name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  coverage:
    name: coverage (>= 95% statements)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: ignore

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      # Fail on high/critical advisories in PRODUCTION dependencies only, so a
      # devDep advisory can't block an unrelated PR. The action ships only its
      # runtime deps (plus the bundled dist/), so prod scope is what users get.
      # `pnpm audit` resolves against pnpm-lock.yaml, so no install is needed.
      - run: pnpm run audit

  build-and-check-dist:
    name: build + dist freshness
    runs-on: ubuntu-latest
    env:
      # Bundle-size ceiling. Bump deliberately if we add genuinely needed deps;
      # never bump just to make CI green.
      MAX_BUNDLE_BYTES: '4194304' # 4 MiB
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Verify dist/ matches src/
        run: |
          if ! git diff --exit-code -- dist/; then
            echo "::error::dist/ is out of sync with src/. Run 'pnpm build' locally and commit the result."
            exit 1
          fi
      - name: Bundle size budget
        run: |
          SIZE=$(wc -c < dist/index.js)
          echo "dist/index.js is $SIZE bytes (budget: $MAX_BUNDLE_BYTES)"
          {
            echo "### Bundle size"
            echo ""
            echo "\`dist/index.js\` = **$SIZE bytes** (budget: **$MAX_BUNDLE_BYTES**)"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$SIZE" -gt "$MAX_BUNDLE_BYTES" ]; then
            echo "::error::dist/index.js exceeds budget. Either trim the dependency footprint or raise MAX_BUNDLE_BYTES in ci.yml with justification."
            exit 1
          fi

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # Runs scripts/actionlint.sh, which downloads a version-pinned actionlint
      # release asset and verifies its SHA-256 before use (no `curl | bash`).
      - name: actionlint
        shell: bash
        run: bash scripts/actionlint.sh
      - name: Check third-party actions are SHA-pinned
        shell: bash
        run: node scripts/check-action-pins.mjs

  self-smoke:
    name: action smoke test (offline)
    runs-on: ubuntu-latest
    needs: build-and-check-dist
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Invoke the bundle with missing action input
        run: |
          set +e
          OUTPUT=$(node dist/index.js 2>&1)
          set -e
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "Input required and not supplied: action" || {
            echo "::error::Expected an error about missing 'action' input"
            exit 1
          }
