name: Benchmark — Node24 action vs Docker-CLI actions

# Measures cold-start + first-byte time for an upload using:
#   - this action (Node24, ncc-bundled)
#   - yamatt/backblaze-b2-upload-action (Docker, wraps backblazeit/b2)
#
# Publishes the comparison as a step summary table. Runs on workflow_dispatch
# only — it's deliberately not on PR because the numbers fluctuate with GH
# runner cold-cache state and we don't want noisy PR signals.

on:
  workflow_dispatch:
  schedule:
    # Weekly, Monday 04:07 UTC. Off-cron-stampede.
    - cron: '7 4 * * 1'

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.repository == 'backblaze-labs/b2-action'
    env:
      PAYLOAD_PATH: ./payload.bin
      PAYLOAD_KEY_OURS: bench/${{ github.run_id }}/ours.bin
      PAYLOAD_KEY_DOCKER: bench/${{ github.run_id }}/docker.bin
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Generate a deterministic 5 MiB payload
        run: dd if=/dev/urandom of=$PAYLOAD_PATH bs=1024 count=5120

      # --- Run 1: this Action (Node24) ----------------------------------
      - name: Upload via this action — wall-clock
        id: ours
        run: |
          START=$(date +%s%N)
          # Invoke ourselves via `uses` in a nested step would re-trigger
          # the harness; easier to capture the elapsed-ms cleanly here:
          echo "start=$START" >> "$GITHUB_OUTPUT"

      - name: 'this action'
        id: ours-step
        uses: ./
        with:
          action: upload
          application-key-id: ${{ secrets.B2_APPLICATION_KEY_ID }}
          application-key: ${{ secrets.B2_APPLICATION_KEY }}
          bucket: ${{ secrets.B2_TEST_BUCKET }}
          source: ${{ env.PAYLOAD_PATH }}
          destination: ${{ env.PAYLOAD_KEY_OURS }}

      - name: Capture this-action elapsed
        id: ours-end
        run: |
          END=$(date +%s%N)
          ELAPSED_MS=$(( (END - ${{ steps.ours.outputs.start }}) / 1000000 ))
          echo "elapsed_ms=$ELAPSED_MS" >> "$GITHUB_OUTPUT"
          echo "this-action elapsed: ${ELAPSED_MS} ms"

      # --- Run 2: Docker-based comparison action ------------------------
      - name: Upload via yamatt/backblaze-b2-upload-action — wall-clock
        id: docker
        run: |
          START=$(date +%s%N)
          echo "start=$START" >> "$GITHUB_OUTPUT"

      - name: 'docker action (yamatt/backblaze-b2-upload-action)'
        uses: yamatt/backblaze-b2-upload-action@v7
        with:
          key_id: ${{ secrets.B2_APPLICATION_KEY_ID }}
          application_key: ${{ secrets.B2_APPLICATION_KEY }}
          bucket_name: ${{ secrets.B2_TEST_BUCKET }}
          file_path: ${{ env.PAYLOAD_PATH }}
          remote_path: ${{ env.PAYLOAD_KEY_DOCKER }}

      - name: Capture docker-action elapsed
        id: docker-end
        run: |
          END=$(date +%s%N)
          ELAPSED_MS=$(( (END - ${{ steps.docker.outputs.start }}) / 1000000 ))
          echo "elapsed_ms=$ELAPSED_MS" >> "$GITHUB_OUTPUT"
          echo "docker-action elapsed: ${ELAPSED_MS} ms"

      # --- Publish comparison -------------------------------------------
      - name: Render comparison
        run: |
          OURS=${{ steps.ours-end.outputs.elapsed_ms }}
          DOCKER=${{ steps.docker-end.outputs.elapsed_ms }}
          if [ "$OURS" -lt "$DOCKER" ]; then
            SPEEDUP=$(echo "scale=2; $DOCKER / $OURS" | bc)
            VERDICT="✅ this action is ${SPEEDUP}× faster"
          else
            VERDICT="⚠️ this action is slower than the Docker action"
          fi
          {
            echo "## Upload benchmark — 5 MiB payload"
            echo ""
            echo "| Action | Wall-clock (ms) |"
            echo "|---|---|"
            echo "| \`backblaze-labs/b2-action\` (Node24, ncc) | $OURS |"
            echo "| \`yamatt/backblaze-b2-upload-action\` (Docker) | $DOCKER |"
            echo ""
            echo "$VERDICT"
            echo ""
            echo "_Note: Wall-clock includes step setup, action cold-start, network, and B2 server time. Runs on standard GitHub-hosted \`ubuntu-latest\`._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup
        if: always()
        uses: ./
        with:
          action: delete
          application-key-id: ${{ secrets.B2_APPLICATION_KEY_ID }}
          application-key: ${{ secrets.B2_APPLICATION_KEY }}
          bucket: ${{ secrets.B2_TEST_BUCKET }}
          source: bench/${{ github.run_id }}/
