name: Release

# Tag-driven release flow. Push a three-component `vX.Y.Z` tag (or a
# `vX.Y.Z-rc.N` pre-release) and this workflow:
#   1. Runs the full test + lint + typecheck + build suite as a gate.
#   2. Verifies the `dist/` committed at the tag matches a fresh `pnpm build`.
#   3. Cuts a GitHub Release with a generated body.
#   4. Moves the floating major tag (e.g. `v1`) to the tagged commit so users
#      pinning `uses: backblaze-labs/b2-action@v1` track the latest minor/patch.
#
# Pre-release tags (`vX.Y.Z-alpha`, `-beta`, `-rc.*`) are published as
# pre-releases and DO NOT update the floating major tag. The bare floating
# tags `v1` / `v2` deliberately do NOT match the trigger below, so this
# workflow re-pointing them never re-runs itself.

on:
  push:
    tags:
      # Three-component semver only. A bare `v1` (the floating major tag this
      # workflow maintains) must NOT trigger a release. `+` = one or more of
      # the preceding char in GitHub's filter syntax.
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0). Must already exist.'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      # Don't install/run git hooks in CI: the floating-tag `git push` below must
      # not trigger the local pre-push coverage hook (which also breaks under the
      # runner's dash shell). Husky honors HUSKY=0 by skipping installation.
      HUSKY: '0'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.REF }}
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      - name: Verify dist/ at tag matches a fresh build
        run: |
          if ! git diff --exit-code -- dist/; then
            echo "::error::dist/ at $REF is out of sync with src/ at the same ref. Tag the commit only after 'pnpm build' is committed."
            exit 1
          fi

      - name: Verify VERSION matches the tag
        run: |
          TAG=${REF#v}
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag '$REF' (-> $TAG) does not match package.json version '$PKG_VERSION'. Bump version before tagging."
            exit 1
          fi
          # End-to-end check that the bundle carries this version. ncc tree-shakes
          # the JSON import in src/version.ts down to the version field and builds
          # the `b2-github-action/<version>` User-Agent from it at runtime, so the
          # token and the inlined version string both appear in the bundle (not as
          # one contiguous literal); a stale dist would carry the old version.
          if ! grep -q "b2-github-action/" dist/index.js; then
            echo "::error::dist/index.js is missing the 'b2-github-action/' User-Agent token. Run 'pnpm build' and commit dist/."
            exit 1
          fi
          if ! grep -q "\"${PKG_VERSION}\"" dist/index.js; then
            echo "::error::dist/index.js does not inline version ${PKG_VERSION}. Run 'pnpm build' and commit dist/ before tagging."
            exit 1
          fi
          echo "Tag $REF matches package.json version $PKG_VERSION and is baked into dist/index.js."

      - name: Identify pre-release
        id: prerelease
        run: |
          if [[ "$REF" =~ -(alpha|beta|rc)([.-][0-9]+)?$ ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ env.REF }}
          name: ${{ env.REF }}
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Move major-version floating tag (e.g. v1)
        if: steps.prerelease.outputs.is_prerelease == 'false'
        env:
          # The default GITHUB_TOKEN CANNOT create/move a tag whose commit
          # contains workflow files (`.github/workflows/`) -- rejected by both
          # `git push` and the refs API (403), and the `workflows` permission
          # can't be granted to it. So use a token that has it: create a
          # fine-grained PAT on this repo with Contents + Workflows: Read and
          # write (or a classic PAT with `repo` + `workflow`) and add it as the
          # FLOATING_TAG_TOKEN secret. If the secret is absent the float is
          # skipped with a warning instead of failing the release.
          GH_TOKEN: ${{ secrets.FLOATING_TAG_TOKEN }}
        run: |
          MAJOR=$(echo "$REF" | sed -nE 's/^(v[0-9]+).*/\1/p')
          if [ -z "$MAJOR" ]; then
            echo "::warning::Could not derive major-version tag from '$REF'; skipping float."
            exit 0
          fi
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::FLOATING_TAG_TOKEN secret not set; skipping float of $MAJOR. Move it by hand: git tag -f $MAJOR $REF && git push origin $MAJOR --force"
            exit 0
          fi
          SHA=$(git rev-parse "${REF}^{commit}")
          echo "Pointing floating tag $MAJOR at $REF ($SHA)"
          # Update the tag if it already exists, otherwise create it.
          if git ls-remote --exit-code --tags origin "refs/tags/$MAJOR" >/dev/null 2>&1; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/git/refs/tags/$MAJOR" \
              -f sha="$SHA" -F force=true
          else
            gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref="refs/tags/$MAJOR" -f sha="$SHA"
          fi
